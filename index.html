<!doctype html>
<html lang="nl">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Aflossingsschema 3 partijen</title>
    <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <style>
      *,
      *::before,
      *::after {
        box-sizing: border-box;
      }
      body {
        font-family: sans-serif;
        background: #f9f9f7;
        color: #111;
        margin: 0;
        padding: 1.5rem;
      }
      input[type="number"] {
        padding: 6px 10px;
        border: 1px solid #ddd;
        border-radius: 8px;
        font-size: 14px;
        width: 100%;
        background: #f5f5f3;
      }
      input[type="number"]:focus {
        outline: none;
        border-color: #aaa;
      }
      h2 {
        font-size: 18px;
        font-weight: 500;
        margin: 0 0 1rem;
      }
      table {
        width: 100%;
        border-collapse: collapse;
        font-size: 12px;
      }
      th {
        text-align: left;
        padding: 6px 8px;
        border-bottom: 1px solid #eee;
        color: #888;
        font-weight: 500;
        white-space: nowrap;
        background: #fafafa;
      }
      td {
        padding: 5px 8px;
        border-bottom: 1px solid #f0f0f0;
        white-space: nowrap;
      }
      tr:hover td {
        background: #fafafa;
      }
    </style>
  </head>
  <body>
    <div id="root"></div>
    <script type="text/babel">
      const { useState, useEffect } = React;

      const fmt = (v) => "€" + Math.round(v).toLocaleString("nl-NL");
      const fmtD = (v) => {
        const [int, dec] = v.toFixed(2).split(".");
        return "€" + int.replace(/\B(?=(\d{3})+(?!\d))/g, ".") + "," + dec;
      };

      function calcAmortization(principal, downPayment, annualRate, months) {
        const rem = principal - downPayment;
        if (rem <= 0) return { monthly: 0, schedule: [], totalInterest: 0 };
        const r =
          annualRate === 0 ? 0 : Math.pow(1 + annualRate / 100, 1 / 12) - 1;
        const monthly =
          r === 0
            ? rem / months
            : (rem * r * Math.pow(1 + r, months)) /
              (Math.pow(1 + r, months) - 1);
        let bal = rem,
          schedule = [],
          totalInt = 0;
        for (let m = 1; m <= months; m++) {
          const interest = bal * r;
          const principal_part = monthly - interest;
          bal -= principal_part;
          if (bal < 0.005) bal = 0;
          totalInt += interest;
          schedule.push({
            month: m,
            payment: monthly,
            interest,
            principal: principal_part,
            balance: bal,
          });
        }
        return { monthly, schedule, totalInterest: totalInt };
      }

      const PARTIES = [
        {
          key: "p1",
          label: "Partij 1",
          badgeBg: "#E6F1FB",
          badgeColor: "#0C447C",
        },
        {
          key: "p2",
          label: "Partij 2",
          badgeBg: "#E1F5EE",
          badgeColor: "#085041",
        },
        {
          key: "p3",
          label: "Partij 3",
          badgeBg: "#FAEEDA",
          badgeColor: "#633806",
        },
      ];

      function Badge({ label, bg, color }) {
        return (
          <span
            style={{
              background: bg,
              color,
              fontSize: 11,
              fontWeight: 500,
              padding: "2px 8px",
              borderRadius: 6,
              display: "inline-block",
            }}
          >
            {label}
          </span>
        );
      }

      function Metric({ label, value, sub }) {
        return (
          <div
            style={{
              background: "#f0f0ee",
              borderRadius: 8,
              padding: "0.75rem 1rem",
            }}
          >
            <div style={{ fontSize: 12, color: "#888", marginBottom: 4 }}>
              {label}
            </div>
            <div style={{ fontSize: 17, fontWeight: 500 }}>{value}</div>
            {sub && (
              <div style={{ fontSize: 11, color: "#aaa", marginTop: 3 }}>
                {sub}
              </div>
            )}
          </div>
        );
      }

      function Field({ label, children }) {
        return (
          <div
            style={{
              display: "flex",
              flexDirection: "column",
              gap: 4,
              marginBottom: 12,
            }}
          >
            <label style={{ fontSize: 12, color: "#888" }}>{label}</label>
            {children}
          </div>
        );
      }

      function NumInput({ value, onChange, step, min }) {
        const [raw, setRaw] = useState(String(value));
        useEffect(() => {
          setRaw(String(value));
        }, [value]);
        return (
          <input
            type="number"
            value={raw}
            step={step}
            min={min}
            onChange={(e) => {
              setRaw(e.target.value);
              const n = parseFloat(e.target.value);
              if (!isNaN(n)) onChange(n);
            }}
            onBlur={() => {
              const n = parseFloat(raw);
              if (isNaN(n)) setRaw(String(value));
            }}
          />
        );
      }

      function Tab({ label, active, onClick }) {
        return (
          <button
            onClick={onClick}
            style={{
              padding: "5px 14px",
              border: `1px solid ${active ? "#999" : "#ddd"}`,
              borderRadius: 8,
              background: active ? "#ebebea" : "transparent",
              color: active ? "#111" : "#888",
              cursor: "pointer",
              fontSize: 13,
              fontWeight: active ? 500 : 400,
            }}
          >
            {label}
          </button>
        );
      }

      const thStyle = {
        textAlign: "left",
        padding: "6px 8px",
        borderBottom: "1px solid #eee",
        color: "#888",
        fontWeight: 500,
        whiteSpace: "nowrap",
        fontSize: 12,
      };
      const tdStyle = {
        padding: "5px 8px",
        borderBottom: "1px solid #f0f0f0",
        whiteSpace: "nowrap",
        fontSize: 12,
      };
      const card = {
        border: "1px solid #e5e5e5",
        borderRadius: 12,
        padding: "1rem 1.25rem",
        marginBottom: "1.5rem",
        background: "#fff",
      };

      function App() {
        const [prijs, setPrijs] = useState(12.5);
        const [m2, setM2] = useState(6110);
        const verkoop = prijs * m2;
        const share = verkoop / 3;

        const [naprijs, setNaprijs] = useState(18.0);
        const nabetaling = naprijs * m2 - verkoop;
        const nabetalingPerPartij = nabetaling / 3;

        const [schemaTab, setSchemaTab] = useState(1);
        const [parties, setParties] = useState([
          { down: 5000, rate: 3.5, term: 120 },
          { down: 5000, rate: 3.5, term: 120 },
          { down: 5000, rate: 3.5, term: 120 },
        ]);

        const updateAll = (field, val) =>
          setParties((p) => p.map((x) => ({ ...x, [field]: val })));
        const results = parties.map((p) =>
          calcAmortization(share, p.down, p.rate, p.term),
        );
        const schedules = results.map((r) => r.schedule);
        const maxM = Math.max(...schedules.map((s) => s.length), 1);

        function exportCSV() {
          let csv =
            "Maand,P1 Betaling,P1 Rente,P1 Aflossing,P1 Saldo,P2 Betaling,P2 Rente,P2 Aflossing,P2 Saldo,P3 Betaling,P3 Rente,P3 Aflossing,P3 Saldo,Totaal\n";
          for (let m = 0; m < maxM; m++) {
            let row = [m + 1],
              tot = 0;
            schedules.forEach((s) => {
              if (m < s.length) {
                const r = s[m];
                tot += r.payment;
                row.push(
                  r.payment.toFixed(2),
                  r.interest.toFixed(2),
                  r.principal.toFixed(2),
                  r.balance.toFixed(2),
                );
              } else row.push("", "", "", "");
            });
            row.push(tot.toFixed(2));
            csv += row.join(",") + "\n";
          }
          const a = document.createElement("a");
          a.href = URL.createObjectURL(new Blob([csv], { type: "text/csv" }));
          a.download = "aflossingsschema.csv";
          a.click();
        }

        return (
          <div style={{ maxWidth: 960, margin: "0 auto" }}>
            <h2>Aflossingsschema — 3 partijen (elk ⅓)</h2>

            {/* Verkoopbedrag */}
            <div style={card}>
              <div style={{ fontWeight: 500, marginBottom: 12 }}>
                Verkoopbedrag
              </div>
              <div
                style={{
                  display: "grid",
                  gridTemplateColumns: "repeat(4, 1fr)",
                  gap: 12,
                  alignItems: "end",
                  marginBottom: 12,
                }}
              >
                <Field label="Prijs per m² (€)">
                  <NumInput
                    value={prijs}
                    onChange={setPrijs}
                    step={0.5}
                    min={0}
                  />
                </Field>
                <Field label="Aantal m²">
                  <NumInput value={m2} onChange={setM2} step={100} min={0} />
                </Field>
                <div>
                  <div style={{ fontSize: 11, color: "#888" }}>
                    Verkoopbedrag
                  </div>
                  <div style={{ fontSize: 22, fontWeight: 500, marginTop: 4 }}>
                    {fmt(verkoop)}
                  </div>
                </div>
                <div>
                  <div style={{ fontSize: 11, color: "#888" }}>
                    Aandeel per partij (⅓)
                  </div>
                  <div style={{ fontSize: 22, fontWeight: 500, marginTop: 4 }}>
                    {fmt(share)}
                  </div>
                </div>
              </div>
              <div
                style={{
                  display: "grid",
                  gridTemplateColumns: "repeat(3, 1fr)",
                  gap: 12,
                }}
              >
                {PARTIES.map((p) => (
                  <Metric
                    key={p.key}
                    label={
                      <Badge
                        label={p.label}
                        bg={p.badgeBg}
                        color={p.badgeColor}
                      />
                    }
                    value={fmt(share)}
                  />
                ))}
              </div>
            </div>

            {/* Nabetaling */}
            <div style={card}>
              <div style={{ fontWeight: 500, marginBottom: 4 }}>Nabetaling</div>
              <div style={{ fontSize: 12, color: "#888", marginBottom: 12 }}>
                Eenmalige betaling per partij na afloop van de looptijd (10
                jaar), gebaseerd op een herziene prijs per m².
              </div>
              <div
                style={{
                  display: "grid",
                  gridTemplateColumns: "repeat(4, 1fr)",
                  gap: 12,
                  alignItems: "end",
                  marginBottom: 12,
                }}
              >
                <Field label="Prijs per m² incl. nabetaling (€)">
                  <NumInput
                    value={naprijs}
                    onChange={setNaprijs}
                    step={0.5}
                    min={0}
                  />
                </Field>
                <div>
                  <div style={{ fontSize: 11, color: "#888" }}>Aantal m²</div>
                  <div style={{ fontSize: 22, fontWeight: 500, marginTop: 4 }}>
                    {m2.toLocaleString("nl-NL")}
                  </div>
                </div>
                <div>
                  <div style={{ fontSize: 11, color: "#888" }}>
                    Totale nabetaling
                  </div>
                  <div style={{ fontSize: 22, fontWeight: 500, marginTop: 4 }}>
                    {fmt(nabetaling)}
                  </div>
                </div>
                <div>
                  <div style={{ fontSize: 11, color: "#888" }}>
                    Nabetaling per partij (⅓)
                  </div>
                  <div style={{ fontSize: 22, fontWeight: 500, marginTop: 4 }}>
                    {fmt(nabetalingPerPartij)}
                  </div>
                </div>
              </div>
              <div
                style={{
                  display: "grid",
                  gridTemplateColumns: "repeat(2, 1fr)",
                  gap: 12,
                }}
              >
                <Metric
                  label="Nabetaling per partij (⅓)"
                  value={fmt(nabetalingPerPartij)}
                  sub="te voldoen na 10 jaar"
                />
                <Metric
                  label="Opbouw totale nabetaling"
                  value={fmt(nabetaling)}
                  sub={`(${m2.toLocaleString("nl-NL")} m² × €${naprijs.toFixed(2)}) − ${fmt(verkoop)} verkoopbedrag`}
                />
              </div>
            </div>

            {/* Aflossingsvoorwaarden */}
            <div style={{ fontWeight: 500, marginBottom: 8 }}>
              Aflossingsvoorwaarden per partij
            </div>
            <div
              style={{
                fontSize: 12,
                color: "#888",
                background: "#f5f5f3",
                borderRadius: 8,
                padding: "6px 10px",
                marginBottom: 12,
              }}
            >
              Standaard rente: 3,5%/jaar — reëel tarief voor onderhandse
              leningen NL 2026. Maandelijkse rente berekend via samengestelde
              interest: (1 + r)^(1/12) − 1.
            </div>
            <div style={card}>
              <div
                style={{
                  display: "grid",
                  gridTemplateColumns: "repeat(3, 1fr)",
                  gap: 12,
                }}
              >
                <Field label="Eenmalige vooruitbetaling (€)">
                  <NumInput
                    value={parties[0].down}
                    onChange={(v) => updateAll("down", v)}
                    step={500}
                  />
                </Field>
                <Field label="Jaarlijkse rente (%)">
                  <NumInput
                    value={parties[0].rate}
                    onChange={(v) => updateAll("rate", v)}
                    step={0.1}
                    min={0}
                  />
                </Field>
                <Field label="Looptijd (maanden)">
                  <NumInput
                    value={parties[0].term}
                    onChange={(v) => updateAll("term", v)}
                    step={1}
                    min={1}
                  />
                </Field>
              </div>
              <div
                style={{
                  display: "grid",
                  gridTemplateColumns: "repeat(3, 1fr)",
                  gap: 12,
                  marginTop: 8,
                }}
              >
                <Metric label="Maandbedrag" value={fmtD(results[0].monthly)} />
                <Metric
                  label="Totaal rente"
                  value={fmtD(results[0].totalInterest)}
                />
                <Metric
                  label="Totaal betaald (incl. rente)"
                  value={fmtD(
                    parties[0].down + results[0].monthly * parties[0].term,
                  )}
                  sub={`${fmt(parties[0].down)} vooruit + ${fmt(results[0].monthly * parties[0].term)} maandelijks (aflossing + rente)`}
                />
              </div>
            </div>

            {/* Aflossingsschema */}
            <div style={{ fontWeight: 500, marginBottom: 8 }}>
              Aflossingsschema
            </div>
            <div
              style={{
                display: "flex",
                gap: 6,
                marginBottom: 12,
                flexWrap: "wrap",
              }}
            >
              {[
                { label: "Per partij", i: 1 },
                { label: "Gecombineerd", i: 0 },
              ].map((t) => (
                <Tab
                  key={t.i}
                  label={t.label}
                  active={schemaTab === t.i}
                  onClick={() => setSchemaTab(t.i)}
                />
              ))}
            </div>

            <div
              style={{
                overflowX: "auto",
                border: "1px solid #e5e5e5",
                borderRadius: 12,
                background: "#fff",
              }}
            >
              {schemaTab === 0 ? (
                <table>
                  <thead>
                    <tr>
                      <th style={thStyle}>Mnd</th>
                      {PARTIES.map((p) => (
                        <React.Fragment key={p.key}>
                          <th style={thStyle}>{p.label} betaling</th>
                          <th style={thStyle}>Rente</th>
                          <th style={thStyle}>Saldo</th>
                        </React.Fragment>
                      ))}
                      <th style={thStyle}>Totaal</th>
                    </tr>
                  </thead>
                  <tbody>
                    {Array.from({ length: maxM }, (_, m) => {
                      let tot = 0;
                      const cells = schedules.map((s) =>
                        m < s.length ? ((tot += s[m].payment), s[m]) : null,
                      );
                      return (
                        <tr key={m}>
                          <td style={tdStyle}>{m + 1}</td>
                          {cells.map((r, si) =>
                            r ? (
                              <React.Fragment key={si}>
                                <td style={tdStyle}>{fmtD(r.payment)}</td>
                                <td style={tdStyle}>{fmtD(r.interest)}</td>
                                <td style={tdStyle}>{fmt(r.balance)}</td>
                              </React.Fragment>
                            ) : (
                              <React.Fragment key={si}>
                                <td style={tdStyle}>—</td>
                                <td style={tdStyle}>—</td>
                                <td style={tdStyle}>—</td>
                              </React.Fragment>
                            ),
                          )}
                          <td style={{ ...tdStyle, fontWeight: 500 }}>
                            {fmtD(tot)}
                          </td>
                        </tr>
                      );
                    })}
                    <tr style={{ background: "#fafafa" }}>
                      <td style={{ ...tdStyle, fontWeight: 700 }}>Totaal</td>
                      {schedules.map((s, si) => (
                        <React.Fragment key={si}>
                          <td style={{ ...tdStyle, fontWeight: 700 }}>
                            {fmtD(s.reduce((a, r) => a + r.payment, 0))}
                          </td>
                          <td style={{ ...tdStyle, fontWeight: 700 }}>
                            {fmtD(s.reduce((a, r) => a + r.interest, 0))}
                          </td>
                          <td style={{ ...tdStyle, fontWeight: 700 }}>—</td>
                        </React.Fragment>
                      ))}
                      <td style={{ ...tdStyle, fontWeight: 700 }}>
                        {fmtD(
                          schedules.reduce(
                            (a, s) => a + s.reduce((b, r) => b + r.payment, 0),
                            0,
                          ),
                        )}
                      </td>
                    </tr>
                  </tbody>
                </table>
              ) : (
                <table>
                  <thead>
                    <tr>
                      <th style={thStyle}>Mnd</th>
                      <th style={thStyle}>Betaling</th>
                      <th style={thStyle}>Rente</th>
                      <th style={thStyle}>Aflossing</th>
                      <th style={thStyle}>Restschuld</th>
                    </tr>
                  </thead>
                  <tbody>
                    {parties[0].down > 0 && (
                      <tr>
                        <td
                          colSpan={5}
                          style={{
                            ...tdStyle,
                            fontSize: 11,
                            color: "#888",
                            background: "#fafafa",
                          }}
                        >
                          Eenmalige vooruitbetaling: {fmt(parties[0].down)}
                        </td>
                      </tr>
                    )}
                    {schedules[0].map((r) => (
                      <tr key={r.month}>
                        <td style={tdStyle}>{r.month}</td>
                        <td style={tdStyle}>{fmtD(r.payment)}</td>
                        <td style={tdStyle}>{fmtD(r.interest)}</td>
                        <td style={tdStyle}>{fmtD(r.principal)}</td>
                        <td style={tdStyle}>{fmt(r.balance)}</td>
                      </tr>
                    ))}
                    <tr style={{ background: "#fafafa" }}>
                      <td style={{ ...tdStyle, fontWeight: 700 }}>Totaal</td>
                      <td style={{ ...tdStyle, fontWeight: 700 }}>
                        {fmtD(schedules[0].reduce((a, r) => a + r.payment, 0))}
                      </td>
                      <td style={{ ...tdStyle, fontWeight: 700 }}>
                        {fmtD(schedules[0].reduce((a, r) => a + r.interest, 0))}
                      </td>
                      <td style={{ ...tdStyle, fontWeight: 700 }}>
                        {fmtD(
                          schedules[0].reduce((a, r) => a + r.principal, 0),
                        )}
                      </td>
                      <td style={{ ...tdStyle, fontWeight: 700 }}>—</td>
                    </tr>
                  </tbody>
                </table>
              )}
            </div>

            <div style={{ marginTop: "1rem", textAlign: "right" }}>
              <button
                onClick={exportCSV}
                style={{
                  padding: "6px 16px",
                  border: "1px solid #ddd",
                  borderRadius: 8,
                  background: "#fff",
                  cursor: "pointer",
                  fontSize: 13,
                }}
              >
                Exporteren als CSV ↓
              </button>
            </div>
          </div>
        );
      }

      ReactDOM.createRoot(document.getElementById("root")).render(<App />);
    </script>
  </body>
</html>
